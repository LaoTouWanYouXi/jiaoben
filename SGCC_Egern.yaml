# 网上国网 · Egern 模块
#
# 文件清单（放在同一目录）：
#   SGCC_Egern.yaml   本模块
#   SGCC_Sync.js      数据同步脚本
#   SGCC_Widget.JS    小组件脚本
#
# 安装步骤：
# 1. MITM 开启 + 安装并信任 Egern 证书
# 2. 工具 → 模块 → 添加本 YAML → 填写 USERNAME / PASSWORD → 启用
# 3. 工具 → 脚本 → 确认出现「网上国网同步」，手动运行一次
# 4. 小组件添加 SGCC_Widget.JS，超时建议 60 秒

name: "网上国网"
description: "拦截电费接口并同步数据到本地缓存，供小组件展示"
author: "local"
icon: "bolt.square.fill"

compat_arguments:
  USERNAME: ""
  PASSWORD: ""
  TIMEOUT: 60

compat_arguments_desc: |
  USERNAME: 网上国网 / 95598.cn 登录账号（手机号）
  PASSWORD: 登录密码
  TIMEOUT: 脚本超时秒数，建议 60

env_schema:
  USERNAME:
    name: 网上国网账号
    description: 登录手机号
  PASSWORD:
    name: 网上国网密码
    description: 登录密码

env:
  SGCC_USERNAME: "{{{USERNAME}}}"
  SGCC_PASSWORD: "{{{PASSWORD}}}"
  username: "{{{USERNAME}}}"
  password: "{{{PASSWORD}}}"

rules:
  - domain:
      match: api.wsgw-rewrite.com
    policy: DIRECT

scriptings:
  - http_request:
      name: "网上国网接口重写"
      match: "^https?:\\/\\/api\\.wsgw-rewrite\\.com\\/electricity\\/bill\\/all"
      script_url: "https://raw.githubusercontent.com/Yuheng0101/X/main/Tasks/95598/95598.js"
      body_required: false
      max_size: 5242880
      timeout: {{{TIMEOUT}}}
      env:
        SGCC_USERNAME: "{{{USERNAME}}}"
        SGCC_PASSWORD: "{{{PASSWORD}}}"
        SGCC_SERVICE: "true"
        username: "{{{USERNAME}}}"
        password: "{{{PASSWORD}}}"

  - schedule:
      name: "网上国网定时同步"
      cron: "0 9,21 * * *"
      script_url: "SGCC_Sync.js"
      timeout: {{{TIMEOUT}}}

  - generic:
      name: "sgcc-sync"
      script_url: "SGCC_Sync.js"
      timeout: {{{TIMEOUT}}}

  - generic:
      name: "sgcc-widget"
      script_url: "SGCC_Widget.JS"
      timeout: {{{TIMEOUT}}}

mitm:
  hostnames:
    includes:
      - api.wsgw-rewrite.com

widgets:
  - name: "sgcc-widget"
    script_name: "sgcc-widget"
    env:
      Index: "0"
